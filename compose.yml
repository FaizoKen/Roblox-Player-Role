services:
  app:
    build: .
    ports:
      - "8089:8089"
    environment:
      DATABASE_URL: postgres://rpr:password@db:5432/roblox_player_role
      SESSION_SECRET: ${SESSION_SECRET}
      BASE_URL: ${BASE_URL}
      LISTEN_ADDR: "0.0.0.0:8089"
      AUTH_GATEWAY_URL: ${AUTH_GATEWAY_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ROBLOX_CLIENT_ID: ${ROBLOX_CLIENT_ID}
      ROBLOX_CLIENT_SECRET: ${ROBLOX_CLIENT_SECRET}
      ROBLOX_API_RATE_LIMIT: ${ROBLOX_API_RATE_LIMIT:-60}
      OPEN_CLOUD_RATE_LIMIT: ${OPEN_CLOUD_RATE_LIMIT:-300}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      RUST_LOG: roblox_player_role=info,tower_http=info
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  db:
    image: postgres:16-alpine
    command: >
      postgres -c shared_buffers=64MB -c work_mem=2MB -c
      maintenance_work_mem=32MB -c effective_cache_size=128MB -c
      max_connections=15 -c wal_buffers=4MB -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
    environment:
      POSTGRES_DB: roblox_player_role
      POSTGRES_USER: rpr
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: "64m"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rpr -d roblox_player_role" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
